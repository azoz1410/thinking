<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأفكار</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dashboard-header">
        <h1>🧠 لوحة الأفكار</h1>
        <div class="header-actions">
            <span id="currentUser" class="current-user"></span>
            <button id="logoutBtn" class="btn-logout">تسجيل الخروج</button>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="columns-container" id="columnsContainer">
            <!-- سيتم إنشاء الأعمدة ديناميكياً من قاعدة البيانات -->
            <div class="loading" style="grid-column: 1/-1; text-align: center; padding: 60px;">
                جاري تحميل الأعضاء...
            </div>
        </div>
    </main>

    <!-- زر إضافة فكرة عائم -->
    <button id="addIdeaBtn" class="fab" title="إضافة فكرة جديدة">+</button>

    <!-- نافذة إضافة فكرة -->
    <div id="addIdeaModal" class="modal">
        <div class="modal-content modal-content-large">
            <div class="modal-header">
                <h2>💡 إضافة فكرة جديدة</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="addIdeaForm">
                <div class="form-group">
                    <label for="ideaTitle">عنوان الفكرة: <span class="required">*</span></label>
                    <input type="text" id="ideaTitle" required placeholder="مثال: تطبيق لإدارة المهام">
                </div>

                <div class="form-group">
                    <label for="ideaDescription">نبذة عن الفكرة: <span class="required">*</span></label>
                    <textarea id="ideaDescription" rows="3" required placeholder="نبذة مختصرة عن الفكرة وأهميتها..."></textarea>
                </div>

                <div class="form-group">
                    <label for="ideaProblem">المشكلة: <span class="required">*</span></label>
                    <textarea id="ideaProblem" rows="4" required placeholder="ما المشكلة التي تحلها هذه الفكرة؟"></textarea>
                </div>

                <div class="form-group">
                    <label for="ideaSolution">الحل المقترح: <span class="required">*</span></label>
                    <textarea id="ideaSolution" rows="4" required placeholder="كيف ستحل هذه الفكرة المشكلة؟"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-primary">✅ إضافة الفكرة</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
